service: pods-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-northeast-1
  stage: dev
  memorySize: 512
  timeout: 30
  
  environment:
    STAGE: dev
    REGION: ap-northeast-1
    DYNAMODB_TABLE_PREFIX: pods-backend-dev
    S3_BUCKET_NAME: pods-backend-dev-storage
    # ローカル環境用の設定
    COGNITO_USER_POOL_ID: local-pool-id
    COGNITO_CLIENT_ID: local-client-id
    JWT_SECRET: local-jwt-secret-key-for-development
    OPENAI_API_KEY: local-openai-key
    TTS_API_KEY: local-tts-key
    # ローカル環境用のDynamoDB設定
    DYNAMODB_ENDPOINT: http://localhost:8000
    IS_OFFLINE: true

plugins:
  - serverless-webpack
  - serverless-offline
  - serverless-dynamodb-local

custom:
  webpack:
    webpackConfig: webpack.config.js
    includeModules: true
  
  serverless-offline:
    httpPort: 3001
    host: 0.0.0.0
    isOffline: true
  
  # DynamoDB Local設定
  dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: false
      heapInitial: 200m
      heapMax: 1g
      migrate: true
      seed: false
      convertEmptyValues: true
    endpoint: http://localhost:8000

functions:
  # ユーザー関連
  createUser:
    handler: src/handlers/user/create.handler
    events:
      - http:
          path: /users
          method: post
          cors: true

# DynamoDBテーブル定義
resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: pods-backend-dev-users
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
          - AttributeName: username
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 5
              WriteCapacityUnits: 5
          - IndexName: username-index
            KeySchema:
              - AttributeName: username
                KeyType: HASH
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 5
              WriteCapacityUnits: 5
        ProvisionedThroughput:
          ReadCapacityUnits: 5
          WriteCapacityUnits: 5 